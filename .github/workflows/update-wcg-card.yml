name: Update WCG card

on:
  workflow_dispatch:
  schedule:
    - cron: "20 2 * * *"

permissions:
  contents: write

concurrency:
  group: update-wcg-card
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.x"
      - name: Capture WCG official statistics card
        run: python scripts/update_wcg_card.py
      - name: Commit changed card
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/world-community-grid.png
          if git diff --cached --quiet; then
            echo "WCG statistics card is already up to date; no commit needed."
            exit 0
          fi
          git commit -m "chore: update WCG statistics card"
          git push
